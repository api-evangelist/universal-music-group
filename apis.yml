aid: universal-music-group
name: Universal Music Group
type: Index
specificationVersion: '0.19'
description: >-
  Universal Music Group N.V. (UMG) is the world's largest music company,
  headquartered in Hilversum, Netherlands with operational headquarters in
  Santa Monica, California. Spun off from Vivendi and listed on Euronext
  Amsterdam (ticker: UMG) on September 21, 2021 at a EUR 54 billion valuation,
  UMG operates Recorded Music, Music Publishing (Universal Music Publishing
  Group / UMPG), and Merchandising (Bravado), plus film and television
  production (PolyGram Entertainment) and the artist services and catalog
  arm Universal Music Enterprises. The company is led by Chairman and CEO
  Sir Lucian Grainge. Major label families include Republic Corps (Republic,
  Island, Def Jam), Interscope Capitol Labels Group (Interscope, Geffen, A&M,
  Capitol, Blue Note, Motown), Virgin Music Group, Verve Label Group (Verve,
  Decca, Deutsche Grammophon, Impulse!, Philips), UMG Nashville (MCA Nashville,
  Mercury Nashville, EMI Records Nashville, Capitol Records Nashville),
  Universal Music Latin Entertainment, and Universal Music UK. Catalog scale
  exceeds 3 million recordings and 4 million compositions. Ownership is split
  among Bolloré / Vivendi (~28%), Tencent Music (~11%), Pershing Square (~10%),
  and the public float. UMG operates no public developer portal: catalog and
  metadata reach developers only indirectly through downstream DSPs (Spotify,
  Apple Music, YouTube, Amazon Music) and through partner / aggregator
  programs (7digital exposed UMG catalog under a partner API; that integration
  is the only third-party developer-facing surface that has ever been openly
  documented). Royalty and publishing portals (UMG Royalty Portal, UMPG Window)
  exist for songwriters and rights holders behind authentication, not as APIs.
  AI is the active integration vector in 2025-2026: UMG has announced licensed
  generative-music partnerships with Udio, Splice, KLAY Vision, SoundLabs,
  ProRata, BandLab, YouTube, TikTok, Meta, and KDDI, and has filed 15+ AI
  patents with Liquidax Capital across collaboration, rights management, music
  & health, and AI threat protection. These integrations operate through
  bilateral commercial agreements, not a self-serve developer program. The
  official Universal-Music-Group GitHub organization (created May 15, 2024)
  has 0 public repositories.
url: https://raw.githubusercontent.com/api-evangelist/universal-music-group/refs/heads/main/apis.yml
