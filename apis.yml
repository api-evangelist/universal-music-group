absences:
  - name: No Public Developer Portal
    description: No developer.universalmusic.com, no api.universalmusic.com, no api keys, no OAuth program, no sandbox, no rate-limit documentation.
  - name: No Public OpenAPI / AsyncAPI
    description: UMG has never published an OpenAPI, AsyncAPI, JSON Schema, or Postman collection. Catalog and metadata exchange happens privately via DDEX over SFTP/vendor APIs.
  - name: No Public SDKs
    description: No first-party language SDKs in any package registry (npm, PyPI, Maven, NuGet, RubyGems, crates.io, Go modules).
  - name: Empty Official GitHub Organization
    description: github.com/Universal-Music-Group exists (created May 15 2024) with 0 public repositories, 0 gists, 0 followers, and no bio.
  - name: No Public Changelog / Status Page
    description: No api.umg.com/status, no public status.universalmusic.com, no machine-readable changelog.
  - name: No Public Pricing
    description: No published API pricing because no API exists. Licensing, royalty, and AI-partnership terms are negotiated privately under NDA.
  - name: No Public RSS / Atom
    description: Corporate news is published as HTML pages on universalmusic.com without a published RSS feed in standard well-known locations.
  - name: No Webhooks
    description: No publicly documented webhook program for any UMG surface (royalty events, release notifications, content drops).

