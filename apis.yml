apis:
  - aid: universal-music-group:umg-corporate
    name: UMG Corporate Web Surface
    description: >-
      The universalmusic.com corporate site is the public-facing surface for
      Universal Music Group. It catalogs UMG's labels, divisions, news,
      sustainability, careers, and investor relations content. The site is
      a marketing and brand surface; no JSON or REST endpoints, no developer
      documentation, and no API key issuance are exposed. The catalog of
      artists, releases, and recordings is not surfaced as a queryable API.
    humanURL: https://www.universalmusic.com
    baseURL: https://www.universalmusic.com
    tags:
      - Brand
      - Corporate
      - News
    properties:
      - type: Website
        url: https://www.universalmusic.com
      - type: AboutUs
        url: https://www.universalmusic.com/about/
      - type: News
        url: https://www.universalmusic.com/news/
      - type: Labels
        url: https://www.universalmusic.com/labels/

  - aid: universal-music-group:umg-royalty-portal
    name: UMG Royalty Portal
    description: >-
      Authenticated royalty statement portal for UMG-distributed artists and
      labels. Provides login-gated access to royalty statements, statement
      history, and supporting documentation. The portal is delivered as a
      web application; no public REST API, no OAuth program, and no
      machine-readable royalty feed are published. Access is provisioned
      through label and business-affairs channels rather than developer
      sign-up.
    humanURL: https://umgroyalty.com
    baseURL: https://umgroyalty.com
    tags:
      - Authenticated
      - Royalties
      - Statements
    properties:
      - type: Portal
        url: https://umgroyalty.com
      - type: Documentation
        url: https://umgroyalty.com/includes/UserGuide.pdf
      - type: Support
        url: https://support.umgroyalty.com/hc/en-us

  - aid: universal-music-group:umpg-window
    name: UMPG Window
    description: >-
      Universal Music Publishing Group's songwriter and client royalty portal,
      providing real-time access to earnings, statements, registrations, and
      catalog data for UMPG-signed songwriters and publisher administration
      clients. Authenticated, login-gated; no public API, OAuth surface, or
      developer documentation. The UMPG Window iOS and Android apps wrap the
      same authenticated surface.
    humanURL: https://umpgwindow.com
    baseURL: https://umpgwindow.com
    tags:
      - Authenticated
      - Compositions
      - Music Publishing
      - Royalties
      - Songwriters
    properties:
      - type: Portal
        url: https://umpgwindow.com
      - type: Website
        url: https://www.umusicpub.com

  - aid: universal-music-group:bravado-merch
    name: Bravado Merchandise Storefronts
    description: >-
      Bravado is UMG's global merchandise and brand-management division,
      operating direct-to-consumer artist merchandise storefronts and tour
      merchandise for UMG's roster. Each artist store is delivered via
      e-commerce platforms (typically Shopify) under artist-branded domains
      coordinated by Bravado. No Bravado-branded public developer API,
      catalog feed, or partner program is documented; integrations to retail
      and platform partners operate through bilateral commercial agreements.
    humanURL: https://www.bravado.com
    baseURL: https://www.bravado.com
    tags:
      - Brand Management
      - E-Commerce
      - Merchandise
      - Tour
    properties:
      - type: Website
        url: https://www.bravado.com

  - aid: universal-music-group:partner-dsp-feeds
    name: UMG Catalog Delivery to DSPs
    description: >-
      UMG's recorded-music catalog reaches developers and end users almost
      exclusively through downstream Digital Service Providers (Spotify,
      Apple Music, Amazon Music, YouTube Music, Tidal, Deezer, Pandora,
      etc.). UMG delivers audio, video, and metadata to those platforms
      through private ingest pipelines (industry-standard DDEX ERN / RIN /
      MEAD messaging delivered over SFTP or vendor-specific APIs). End
      developers query UMG-owned content through each DSP's own public API,
      not through any UMG-branded API surface. UMG itself publishes no
      DSP-style public catalog API.
    humanURL: https://www.universalmusic.com
    baseURL: https://www.universalmusic.com
    tags:
      - Catalog
      - DDEX
      - Distribution
      - DSP
      - Metadata
    properties:
      - type: ReferenceStandard
        url: https://ddex.net/
      - type: PartnerProgram
        url: https://www.universalmusic.com/contact/

  - aid: universal-music-group:partner-7digital
    name: 7digital UMG Catalog API (Partner Surface)
    description: >-
      7digital operates a B2B catalog and media-delivery API that includes
      UMG-licensed recordings for hackathon and partner use. This is the
      closest thing to a publicly documented developer surface for UMG
      catalog content, but the endpoint, authentication, and commercial
      terms are owned and operated by 7digital, not UMG. UMG itself
      neither documents nor distributes API keys for this surface.
    humanURL: https://7digital.gitbook.io/api-doc
    baseURL: https://api.7digital.com
    tags:
      - Aggregator
      - Catalog
      - Partner API
      - Recorded Music
    properties:
      - type: Documentation
        url: https://7digital.gitbook.io/api-doc
      - type: PartnerOf
        url: https://www.7digital.com

  - aid: universal-music-group:ai-licensing-program
    name: UMG AI Licensing Program
    description: >-
      UMG's "Artist Centric AI" framework governs licensed access to UMG's
      recordings and compositions by generative-AI music platforms. The
      program is operated as a series of bilateral commercial agreements,
      not as a self-serve developer program. As of 2025-2026, announced
      partners include Udio (licensed generative platform with catalog
      training and remixing rights), Splice (AI music tools for artists),
      SoundLabs, KLAY Vision, ProRata, BandLab Technologies (ethical AI
      framework), YouTube (AI Music Principles), TikTok, Meta, and KDDI.
      Liquidax Capital co-develops UMG's AI patent portfolio (15+ filings
      across musical collaboration, multimedia content, music & health,
      AI threat protection, and rights management). No public OpenAPI,
      no token issuance, no sandbox.
    humanURL: https://www.universalmusic.com
    baseURL: https://www.universalmusic.com
    tags:
      - AI
      - Generative Music
      - Licensing
      - Partnerships
      - Rights Management
    properties:
      - type: PartnerProgram
        url: https://www.universalmusic.com/contact/
      - type: PressRoom
        url: https://www.universalmusic.com/news/

  - aid: universal-music-group:github-org
    name: Universal-Music-Group GitHub Organization
    description: >-
      Official UMG GitHub organization (login Universal-Music-Group, org id
      169924279), created May 15, 2024. As of profiling, the org has 0
      public repositories, 0 public gists, 0 followers, no bio, no blog,
      no email, and no published members. The organization exists as a
      brand placeholder; UMG's engineering output is not published openly.
      An unrelated GitHub login `umg` (with 51 repos) is gated behind UMG
      single-sign-on and is also not an open developer surface.
    humanURL: https://github.com/Universal-Music-Group
    baseURL: https://api.github.com/users/Universal-Music-Group
    tags:
      - GitHub
      - Source Code
    properties:
      - type: GitHubOrganization
        url: https://github.com/Universal-Music-Group
      - type: ProfileAPI
        url: https://api.github.com/users/Universal-Music-Group

